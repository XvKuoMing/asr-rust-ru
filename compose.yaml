services:
  asr:
    build: .
    image: kamasalyamov/asr-rust:1.0.1
    env_file:
      - .env
    environment:
      - RUST_LOG=info
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8080}
      - BATCH_SIZE=${BATCH_SIZE:-16}
      - BATCH_TIMEOUT_MS=${BATCH_TIMEOUT_MS:-5}
      - CORRECTOR_DIR=${CORRECTOR_DIR:-corrector}
    volumes:
      # Brand-corrector LM (optional). Build it with scripts/prepare_corrector.py;
      # without it the service runs fine and '-lmcorr' requests are rejected.
      - ${CORRECTOR_HOST_DIR:-./corrector}:/app/corrector:ro
      # Uncomment if the image was built without baked weights (geo-blocked CDN)
      # or to serve your own fine-tuned model (scripts/convert_finetuned.py):
      # - ${WEIGHTS_HOST_DIR:-./weights}:/app/weights:ro
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
